name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare prod google-services from CI secret (optional)
        if: ${{ secrets.PROD_GOOGLE_SERVICES_JSON != '' }}
        run: |
          mkdir -p app/src/prod
          echo "${{ secrets.PROD_GOOGLE_SERVICES_JSON }}" | base64 -d > app/src/prod/google-services.json

      - name: Check formatting
        run: ./gradlew ktlintCheck

      - name: Static analysis
        run: ./gradlew detekt lintDevDebug

      - name: Unit tests
        run: ./gradlew test

      - name: Build dev debug APK
        run: ./gradlew :app:assembleDevDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-management-dev-debug-apk
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk
          if-no-files-found: error
